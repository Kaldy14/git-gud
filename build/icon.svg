<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title">
  <title id="title">Git Gud app icon</title>
  <defs>
    <linearGradient id="background" x1="142" y1="92" x2="884" y2="940" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12283b"/>
      <stop offset="1" stop-color="#081827"/>
    </linearGradient>
    <linearGradient id="git" x1="300" y1="236" x2="724" y2="792" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff5737"/>
      <stop offset="1" stop-color="#f0442d"/>
    </linearGradient>
    <linearGradient id="cigar" x1="572" y1="594" x2="862" y2="594" gradientUnits="userSpaceOnUse">
