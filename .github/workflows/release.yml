name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Apple signing secrets
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          required_secrets=(
            MACOS_CERTIFICATE_P12_BASE64
            MACOS_CERTIFICATE_PASSWORD
            APPLE_API_KEY_P8_BASE64
            APPLE_API_KEY_ID
            APPLE_API_ISSUER
          )
          missing_secrets=()

          for secret_name in "${required_secrets[@]}"; do
            if [[ -z "${!secret_name}" ]]; then
              missing_secrets+=("$secret_name")
            fi
          done

          if (( ${#missing_secrets[@]} > 0 )); then
            printf 'Missing required GitHub Actions secrets: %s\n' "${missing_secrets[*]}"
            exit 1
          fi

      - name: Import Developer ID certificate
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_path="$RUNNER_TEMP/git-gud-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"

          signing_identity="$(
            security find-identity -v -p codesigning "$keychain_path" \
              | awk -F '"' '/Developer ID Application:/ { print $2; exit }'
          )"

          if [[ -z "$signing_identity" ]]; then
            echo 'The certificate does not contain a valid Developer ID Application identity.'
            exit 1
          fi

          echo "MACOS_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"
          echo "MACOS_SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"
          echo "MACOS_CERTIFICATE_PATH=$certificate_path" >> "$GITHUB_ENV"

      - name: Prepare App Store Connect API key
        shell: bash
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"

      - name: Build macOS application
        env:
          GIT_GUD_VERSION: ${{ github.ref_name }}
        run: pnpm dist

      - name: Notarize and staple macOS application
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: node scripts/notarize-macos-app.mjs

      - name: Verify signed and notarized application
        shell: bash
        run: |
          codesign --verify --deep --strict --verbose=2 "dist/mac/Git Gud.app"
          xcrun stapler validate "dist/mac/Git Gud.app"
          spctl --assess --type execute --verbose=4 "dist/mac/Git Gud.app"

      - name: Package release artifact
        shell: bash
        run: |
          archive_name="Git-Gud-${GITHUB_REF_NAME}-macOS-${{ matrix.arch }}.zip"
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "dist/mac/Git Gud.app" "artifacts/$archive_name"
          cd artifacts
          shasum -a 256 "$archive_name" > "$archive_name.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          path: artifacts/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Remove temporary Apple credentials
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -n "${MACOS_SIGNING_KEYCHAIN:-}" ]]; then
            security delete-keychain "$MACOS_SIGNING_KEYCHAIN" || true
          fi
          rm -f \
            "${MACOS_CERTIFICATE_PATH:-}" \
            "${APPLE_API_KEY_PATH:-}"

  publish:
    name: Publish GitHub Release
    needs: build-macos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Verify checksums
        shell: bash
        run: |
          cd release-artifacts
          for checksum in *.sha256; do
            shasum -a 256 -c "$checksum"
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          release-artifacts/*
          --verify-tag
          --generate-notes
          --title "Git Gud $GITHUB_REF_NAME"
