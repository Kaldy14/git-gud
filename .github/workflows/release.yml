name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_version."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS application
        run: pnpm dist

      - name: Package release artifact
        shell: bash
        run: |
          archive_name="Git-Gud-${GITHUB_REF_NAME}-macOS-${{ matrix.arch }}.zip"
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "dist/mac/Git Gud.app" "artifacts/$archive_name"
          cd artifacts
          shasum -a 256 "$archive_name" > "$archive_name.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          path: artifacts/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: build-macos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Verify checksums
        shell: bash
        run: |
          cd release-artifacts
          for checksum in *.sha256; do
            shasum -a 256 -c "$checksum"
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          release-artifacts/*
          --verify-tag
          --generate-notes
          --title "Git Gud $GITHUB_REF_NAME"
